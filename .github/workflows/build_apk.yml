name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ccache autoconf libtool pkg-config zlib1g-dev libncurses5-dev libffi-dev libssl-dev git wget unzip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip wheel setuptools
          pip install buildozer==1.5.0 cython==0.29.33
          pip install kivy==2.2.0 pillow qrcode[pil]

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          # 关键：删除 buildozer 目录，让它重新开始
          rm -rf $HOME/.buildozer
          mkdir -p $HOME/.buildozer/android/platform
          
          # 预先下载 ANT（避免下载失败）
          cd $HOME/.buildozer/android/platform
          wget -q https://archive.apache.org/dist/ant/binaries/apache-ant-1.9.4-bin.tar.gz
          tar -xzf apache-ant-1.9.4-bin.tar.gz
          
          # 返回项目目录
          cd $HOME/work/lamaqi-app/lamaqi-app
          
          # 接受许可证
          mkdir -p $HOME/.buildozer/android/platform/android-sdk
          cd $HOME/.buildozer/android/platform/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/bin cmdline-tools/latest/ 2>/dev/null || true
          mv cmdline-tools/lib cmdline-tools/latest/ 2>/dev/null || true
          mv cmdline-tools/NOTICE.txt cmdline-tools/latest/ 2>/dev/null || true
          mv cmdline-tools/source.properties cmdline-tools/latest/ 2>/dev/null || true
          yes | cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # 返回项目并构建
          cd $HOME/work/lamaqi-app/lamaqi-app
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lamaqi.apk
          path: bin/*.apk
          retention-days: 7
