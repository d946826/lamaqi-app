name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ccache autoconf libtool pkg-config zlib1g-dev libncurses5-dev libffi-dev libssl-dev git wget unzip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip wheel setuptools
          pip install buildozer==1.5.0 cython==0.29.33
          pip install kivy==2.2.0 pillow qrcode[pil]

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          BUILDZOOZER_SDK_ROOT: /usr/local/lib/android/sdk
          BUILDZOOZER_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
          BUILDZOOZER_ANDROID_API: 33
          BUILDZOOZER_ANDROID_NDK_API: 27
        run: |
          # 使用 GitHub Actions 自带的 SDK 路径
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/27.3.13750724
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          
          # 创建符号链接，让 buildozer 能找到 SDK
          mkdir -p $HOME/.buildozer/android/platform
          ln -sf $ANDROID_SDK_ROOT $HOME/.buildozer/android/platform/android-sdk 2>/dev/null || true
          ln -sf $ANDROID_NDK_ROOT $HOME/.buildozer/android/platform/android-ndk-r28c 2>/dev/null || true
          
          # 运行 buildozer
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lamaqi.apk
          path: bin/*.apk
          retention-days: 7
