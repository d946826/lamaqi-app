name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ccache autoconf libtool pkg-config zlib1g-dev libncurses5-dev libffi-dev libssl-dev git wget unzip

      - name: Install Python dependencies (with retry)
        run: |
          pip install --upgrade pip wheel setuptools
          
          # 使用重试机制安装依赖
          for i in 1 2 3; do
            pip install --no-cache-dir buildozer==1.5.0 && break
            sleep 5
          done
          
          for i in 1 2 3; do
            pip install --no-cache-dir cython==0.29.33 && break
            sleep 5
          done
          
          for i in 1 2 3; do
            pip install --no-cache-dir kivy==2.2.0 pillow qrcode[pil] && break
            sleep 5
          done

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          # 清理旧的 buildozer 目录
          rm -rf $HOME/.buildozer
          mkdir -p $HOME/.buildozer/android/platform
          
          # 预先下载 ANT
          cd $HOME/.buildozer/android/platform
          for i in 1 2 3; do
            wget -q https://archive.apache.org/dist/ant/binaries/apache-ant-1.9.4-bin.tar.gz && break
            sleep 5
          done
          tar -xzf apache-ant-1.9.4-bin.tar.gz
          
          # 预先下载并设置 Android SDK cmdline-tools
          mkdir -p $HOME/.buildozer/android/platform/android-sdk
          cd $HOME/.buildozer/android/platform/android-sdk
          for i in 1 2 3; do
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip && break
            sleep 5
          done
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/bin cmdline-tools/latest/ 2>/dev/null || true
          mv cmdline-tools/lib cmdline-tools/latest/ 2>/dev/null || true
          mv cmdline-tools/NOTICE.txt cmdline-tools/latest/ 2>/dev/null || true
          mv cmdline-tools/source.properties cmdline-tools/latest/ 2>/dev/null || true
          yes | cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # 返回项目目录
          cd $HOME/work/lamaqi-app/lamaqi-app
          
          # 运行 buildozer
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lamaqi.apk
          path: bin/*.apk
          retention-days: 7
